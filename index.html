<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Consultar Precio</title>

<style>
body { 
  font-family: Arial; 
  text-align: center; 
  padding: 30px;
  padding-bottom: 90px;
}

button {
  display: block;
  margin: 10px auto;
  
  background: #333;
  color: white;
  
  padding: 14px;
  border-radius: 10px;
  
  font-size: 16px;
  font-weight: bold;
  
  width: 90%;
  max-width: 350px;
  
  border: none;
}

#btnWhatsAppFloat {
  display: block;
  margin: 15px auto;
  
  background: #25D366;
  color: white;
  
  padding: 16px;        /* 👈 AQUÍ */
  font-size: 17px;      /* 👈 AQUÍ */
  
  border-radius: 10px;
  
  text-decoration: none;
  font-weight: bold;
  
  width: 90%;
  max-width: 350px;
  
  text-align: center;
}

.hidden {
  display: none;
}

@keyframes latido {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
</style>

</head>

<body>

<h2>Consultar Precio</h2>

<p id="producto"></p>

<label>
  <input type="radio" name="moneda" value="usd" checked> USD
</label>

<label>
  <input type="radio" name="moneda" value="bs"> Bolívares
</label>

<br><br>

<button onclick="mostrarPrecio()">Ver precio</button>

<a id="btnWhatsAppFloat" target="_blank" class="hidden">
  💬 Consultar por WhatsApp
</a>

<br><br>

<h3 id="resultado"></h3>

<script>

// 🔹 CONFIG
const numeroWhatsApp = "584129578184";
const API_URL = "https://script.google.com/macros/s/AKfycbz6nkaIl3O7FOy2-qs2mZ24nRjrp5iPPaz25nAfvDLiU5UEwEKv8zgvPQ5mjhMuOfXO7w/exec";

// 🔹 Obtener código QR
const params = new URLSearchParams(window.location.search);
const codigoQR = params.get("codigo");

// 🔹 Mostrar código
document.getElementById("producto").innerText = "Producto: " + (codigoQR || "N/A");

// 🔹 Obtener datos
async function obtenerDatos() {
  try {
    const res = await fetch(`${API_URL}?codigo=${codigoQR}`);
    return await res.json();
  } catch (error) {
    console.error("Error:", error);
    return null;
  }
}
  function obtenerSaludo() {
  const hora = new Date().getHours();

  if (hora < 12) return "Buenos días";
  if (hora < 19) return "Buenas tardes";
  return "Buenas noches";
}

// 🔹 Generar mensaje WhatsApp
function generarMensaje(data, moneda) {

  const saludo = obtenerSaludo();

  // 🔵 CALCULADORA (si hay total)
  if (data.totalUSD) {
    return `Hola, ${saludo} 👋

Estoy interesado en esta cotización:

🔹 Código: ${data.codigo}
🔹 Área: ${data.area} m²

📦 Cantidad: ${data.cantidad}

💰 Total:
USD: $${data.totalUSD}
Bs: ${Math.round(data.totalBS).toLocaleString()}

¿Disponibilidad y tiempo de entrega?`;
  }

  // 🟢 PRODUCTO
  if (moneda === "usd") {
    return `Hola, ${saludo} 👋

Estoy interesado en el producto:

🔹 Código: ${data.codigo}
💵 Precio: $${data.precioUSD}

¿Disponibilidad?`;
  }

  return `Hola, ${saludo} 👋

Estoy interesado en el producto:

🔹 Código: ${data.codigo}
🇻🇪 Precio: ${Math.round(data.precioBS).toLocaleString()} Bs

¿Disponibilidad?`;
}
// 🔹 Mostrar precio + botón
async function mostrarPrecio() {

  const resultado = document.getElementById("resultado");
  const boton = document.getElementById("btnWhatsAppFloat");

  resultado.innerText = "⏳ Consultando...";

  const data = await obtenerDatos();

  console.log("DATA:", data);

  if (!data || data.error) {
    resultado.innerText = "Producto no encontrado";
    boton.classList.add("hidden");
    return;
  }

  const moneda = document.querySelector('input[name="moneda"]:checked');

  if (!moneda) {
    alert("Seleccione una opción");
    return;
  }

  if (moneda.value === "usd") {
    resultado.innerText = "💵 USD: $" + data.precioUSD;
  } else {
    resultado.innerText = "🇻🇪 Bs: " + Math.round(data.precioBS).toLocaleString();
  }

  // 🔥 Activar botón WhatsApp
  const mensaje = generarMensaje(data, moneda.value);
  const link = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensaje)}`;

  boton.href = link;
  boton.classList.remove("hidden");
}
  // 🔹 Ejecutar automáticamente al cargar
document.addEventListener("DOMContentLoaded", () => {
  mostrarPrecio();
});

// 🔹 Ejecutar al cambiar moneda
document.addEventListener("change", mostrarPrecio);

</script>

</body>
</html>
