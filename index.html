<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Consultar Precio</title>
<style>
body { font-family: Arial; text-align: center; padding: 30px; }
button { padding: 10px 20px; font-size: 16px; }
</style>
</head>

<body>

<h2>Consultar Precio</h2>

<p id="producto"></p>

<label>
  <input type="radio" name="moneda" value="usd"> USD
</label>
<label>
  <input type="radio" name="moneda" value="bs"> Bolívares
</label>

<br><br>

<button onclick="mostrarPrecio()">Ver precio</button>

<h3 id="resultado"></h3>

<script>

// 🔹 CONFIG
const numeroWhatsApp = "584129578184";
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1pmgX0wJePlOt3IRyiUPF5uybRCQaewLMVbeSQDi0Ci4/gviz/tq?tqx=out:json&sheet=Calculadora";

// 🔹 VARIABLES GLOBALES (cache)
let datosCache = null;
let ultimaActualizacion = 0;
const CACHE_TIME = 5000;

// 🔹 Obtener código QR
const params = new URLSearchParams(window.location.search);
const codigoQR = params.get("codigo");

// 🔹 Mostrar código
document.getElementById("producto").innerText = "Producto: " + (codigoQR || "N/A");

// 🔹 Detectar móvil
function esMovil() {
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

// 🔹 Obtener datos con cache
async function obtenerDatos() {

  const ahora = Date.now();

  if (datosCache && (ahora - ultimaActualizacion < CACHE_TIME)) {
    return datosCache;
  }

  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    const rows = json.table.rows;

    datosCache = {
      codigo: rows[1]?.c[1]?.v,
      area: rows[2]?.c[1]?.v,
      cobertura: rows[8]?.c[1]?.v,
      cantidad: rows[9]?.c[1]?.v,
      precioUSD: rows[6]?.c[1]?.v,
      precioBS: rows[7]?.c[1]?.v,
      totalUSD: rows[11]?.c[1]?.v,
      totalBS: rows[12]?.c[1]?.v
    };

    ultimaActualizacion = ahora;

    return datosCache;

  } catch (error) {
    console.error("Error obteniendo datos:", error);
    return null;
  }
}

// 🔹 Mostrar precio
async function mostrarPrecio() {

  const data = await obtenerDatos();

  if (!data || !data.codigo) {
    document.getElementById("resultado").innerText = "Producto no encontrado";
    return;
  }

  const moneda = document.querySelector('input[name="moneda"]:checked');

  if (!moneda) {
    alert("Seleccione una opción");
    return;
  }

  if (moneda.value === "usd") {
    document.getElementById("resultado").innerText =
      "💵 USD: $" + data.precioUSD;
  } else {
    document.getElementById("resultado").innerText =
      "🇻🇪 Bs: " + data.precioBS;
  }
}

// 🔹 Generar mensaje WhatsApp
function generarMensaje(d, nombre) {

  if (esMovil()) {
    return `Hola, soy ${nombre || "cliente"} 👋

Código: ${d.codigo}
Total: $${d.totalUSD}

¿Disponibilidad?`;
  }

  return `Hola, buen día.

Mi nombre es ${nombre || "cliente"}.

Cotización:

🔹 Código: ${d.codigo}
🔹 Área: ${d.area} m2

📦 Cantidad: ${d.cantidad}

💰 Totales:
USD: $${d.totalUSD}
Bs: ${d.totalBS}

¿Disponibilidad y entrega?`;
}

// 🔹 Botón WhatsApp
async function activarBoton() {

  const data = await obtenerDatos();
  const boton = document.getElementById("btnWhatsAppFloat");
  const nombreInput = document.getElementById("nombreCliente");

  if (!boton) return;

  const nombre = nombreInput ? nombreInput.value.trim() : "";

  if (!data || !data.codigo || !data.area) {
    boton.classList.add("hidden");
    return;
  }

  const mensaje = generarMensaje(data, nombre);
  const link = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensaje)}`;

  boton.href = link;
  boton.classList.remove("hidden");
}

// 🔹 Inicialización
document.addEventListener("DOMContentLoaded", () => {
  activarBoton();
});

// 🔹 Actualización periódica
setInterval(activarBoton, 5000);


</script>

</body>
</html>
