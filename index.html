<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculadora de Precio</title>

<style>
body { 
  font-family: Arial; 
  text-align: center; 
  padding: 30px;
}

input, button {
  display: block;
  margin: 10px auto;
  padding: 14px;
  font-size: 16px;
  width: 90%;
  max-width: 350px;
}

button {
  background: #333;
  color: white;
  border: none;
  border-radius: 10px;
}

#btnWhatsApp {
  display: block;
  margin: 20px auto;
  
  background: #25D366;
  color: white;
  
  padding: 18px;
  font-size: 18px;
  font-weight: bold;
  
  border-radius: 12px;
  text-decoration: none;

  width: 95%;
  max-width: 380px;

  text-align: center;

  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}


.hidden {
  display: none;
}
</style>

</head>

<body>

<h2>🧮 Calcula tu proyecto</h2>

<input type="text" id="codigo" placeholder="Código del producto">
<input type="number" id="area" placeholder="Área en m²">

<label>
  <input type="radio" name="moneda" value="usd" checked> USD
</label>

<label>
  <input type="radio" name="moneda" value="bs"> Bolívares
</label>

<button onclick="calcular()">Calcular</button>

<h3 id="resultado"></h3>

<a id="btnWhatsApp" target="_blank" class="hidden">
  💬 Consultar por WhatsApp
</a>

<script>

// CONFIG
const numeroWhatsApp = "584129578184";
const API_URL = "https://script.google.com/macros/s/AKfycbz6nkaIl3O7FOy2-qs2mZ24nRjrp5iPPaz25nAfvDLiU5UEwEKv8zgvPQ5mjhMuOfXO7w/exec";

// SALUDO
function obtenerSaludo() {
  const hora = new Date().getHours();
  if (hora < 12) return "Buenos días";
  if (hora < 19) return "Buenas tardes";
  return "Buenas noches";
}

// CALCULAR
async function calcular() {

  const codigo = document.getElementById("codigo").value.trim();
  const area = parseFloat(document.getElementById("area").value);
  const resultado = document.getElementById("resultado");
  const boton = document.getElementById("btnWhatsApp");

  if (!codigo || !area) {
    alert("Ingrese código y área");
    return;
  }

  resultado.innerText = "⏳ Calculando...";

  // 🔥 Traer precio
  const res = await fetch(`${API_URL}?codigo=${codigo}`);
  const data = await res.json();

  if (!data || data.error) {
    resultado.innerText = "Producto no encontrado";
    boton.classList.add("hidden");
    return;
  }

  // 🔹 DATOS (puedes ajustar)
  const cobertura = 2.97;
  const division = area / cobertura;
const entero = Math.floor(division);
const decimal = division - entero;

let cantidad;

if (decimal <= 0.2) {
  cantidad = entero;
} else {
  cantidad = entero + 1;
  if (cantidad < 1) cantidad = 1;

}

  const totalUSD = cantidad * data.precioUSD;
  const totalBS = cantidad * data.precioBS;

  // 🔹 Mostrar resultado
  resultado.innerHTML = `
  🔹 Cantidad: ${cantidad}<br><br>
  💰 Total:<br>
  USD: <b>$${totalUSD}</b><br>
  Bs: <b>${Math.round(totalBS).toLocaleString()}</b>
  `;

  // 🔹 WhatsApp
  const saludo = obtenerSaludo();

  const mensaje = `Hola, ${saludo} 👋

Estoy interesado en esta cotización:

🔹 Código: ${codigo}
🔹 Área: ${area} m²
📦 Cantidad: ${cantidad}

💰 Total:
USD: $${totalUSD}
Bs: ${Math.round(totalBS).toLocaleString()}

¿Disponibilidad y entrega?`;

  const link = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensaje)}`;

  boton.href = link;
  boton.classList.remove("hidden");
}

</script>

</body>
</html>
