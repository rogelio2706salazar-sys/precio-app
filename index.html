<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <title>Consultar Precio</title> <style> body { font-family: Arial; text-align: center; padding: 30px; } button { padding: 10px 20px; font-size: 16px; } #btnWhatsAppFloat { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; padding: 15px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); animation: latido 1.5s infinite; z-index: 999; } .hidden { display: none; } @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } } </style> </head> <body> <h2>Consultar Precio</h2> <p id="producto"></p> <label> <input type="radio" name="moneda" value="usd" checked> USD </label> <label> <input type="radio" name="moneda" value="bs"> Bolívares </label> <br><br> <button onclick="mostrarPrecio()">Ver precio</button> <a id="btnWhatsAppFloat" target="_blank" class="hidden"> 💬 Consultar por WhatsApp </a> <br><br> <h3 id="resultado"></h3>



<script>

// 🔹 CONFIG
const numeroWhatsApp = "584129578184";
const API_URL = "https://script.google.com/macros/s/AKfycbz6nkaIl3O7FOy2-qs2mZ24nRjrp5iPPaz25nAfvDLiU5UEwEKv8zgvPQ5mjhMuOfXO7w/exec";

// 🔹 Obtener código QR
const params = new URLSearchParams(window.location.search);
const codigoQR = params.get("codigo");

// 🔹 Mostrar código
document.getElementById("producto").innerText = "Producto: " + (codigoQR || "N/A");

// 🔹 Obtener datos
async function obtenerDatos() {
  try {
    const res = await fetch(`${API_URL}?codigo=${codigoQR}`);
    return await res.json();
  } catch (error) {
    console.error("Error:", error);
    return null;
  }
}

// 🔹 Generar mensaje WhatsApp
function generarMensaje(data, moneda) {

  if (moneda === "usd") {
    return `Hola, buen día.

Estoy interesado en el producto:

🔹 Código: ${data.codigo}
💵 Precio: $${data.precioUSD}

¿Disponibilidad?`;
  }

  return `Hola, buen día.

Estoy interesado en el producto:

🔹 Código: ${data.codigo}
🇻🇪 Precio: ${Math.round(data.precioBS).toLocaleString()} Bs

¿Disponibilidad?`;
}

// 🔹 Mostrar precio + activar botón
async function mostrarPrecio() {

  const resultado = document.getElementById("resultado");
  const boton = document.getElementById("btnWhatsAppFloat");

  resultado.innerText = "⏳ Consultando...";

  const data = await obtenerDatos();

  console.log("DATA:", data);

  if (!data || data.error) {
    resultado.innerText = "Producto no encontrado";
    boton.classList.add("hidden");
    return;
  }

  const moneda = document.querySelector('input[name="moneda"]:checked');

  if (!moneda) {
    alert("Seleccione una opción");
    return;
  }

  if (moneda.value === "usd") {
    resultado.innerText = "💵 USD: $" + data.precioUSD;
  } else {
    resultado.innerText = "🇻🇪 Bs: " + Math.round(data.precioBS).toLocaleString();
  }

  // 🔥 ACTIVAR BOTÓN
  const mensaje = generarMensaje(data, moneda.value);
  const link = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensaje)}`;

  boton.href = link;
  boton.classList.remove("hidden");
}

</script>
